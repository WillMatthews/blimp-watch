<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>blimp-watch — D-LZFN live</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,sans-serif}
  #map{position:absolute;inset:0}
  #panel{position:absolute;top:10px;left:10px;z-index:2;background:rgba(255,255,255,.94);
    padding:12px 14px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.25);max-width:340px}
  #panel h1{margin:0 0 6px;font-size:15px}
  #summary{font-size:13px;color:#222;margin:6px 0}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
  .meta{font-size:11px;color:#666;margin-top:6px}
  .meta a{color:#2668c7}
  /* the blimp marker */
  .blimp{width:34px;height:34px;cursor:pointer;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))}
  @media (prefers-color-scheme: dark){
    #panel{background:rgba(28,28,30,.94);color:#eee}
    #summary{color:#ddd}.meta{color:#aaa}
  }
</style>
</head>
<body>
<div id="panel">
  <h1>🛩️ blimp-watch — D-LZFN</h1>
  <div><span id="badge" class="badge" style="background:#888">…</span></div>
  <div id="summary">connecting…</div>
  <div class="meta" id="meta"></div>
</div>
<div id="map"></div>
<script>
const STYLE = 'https://tiles.openfreemap.org/styles/liberty';  // free vector tiles, no key
const BADGE = {
  airborne_london:['OVER LONDON','#c0392b'], airborne_uk:['OVER THE UK','#2668c7'],
  airborne_away:['OUTSIDE UK','#8e44ad'], ground:['ON GROUND','#7f8c8d'],
  offline:['OFFLINE','#34495e'], unknown:['…','#888']
};

// top-down airship silhouette — nose points "up" (north) at 0°, then rotated to track.
const BLIMP_SVG = `
<svg class="blimp" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- tail fins (cruciform) -->
  <path d="M20 27 L11 34 L20 33 Z" fill="#c77d16"/>
  <path d="M20 27 L29 34 L20 33 Z" fill="#c77d16"/>
  <!-- envelope: rounded nose (top), tapered tail (bottom) -->
  <path d="M20 3 C26 3 26.5 12 26 20 C25.6 29 23 34 20 37
           C17 34 14.4 29 14 20 C13.5 12 14 3 20 3 Z"
        fill="#f2a626" stroke="#7a4a05" stroke-width="1.3"/>
  <!-- centre line + gondola -->
  <line x1="20" y1="6" x2="20" y2="34" stroke="#7a4a05" stroke-width="0.7" opacity="0.5"/>
  <rect x="18" y="19" width="4" height="7" rx="1.5" fill="#333"/>
</svg>`;

const map = new maplibregl.Map({
  container:'map', style:STYLE, center:[-2.5,54], zoom:5, attributionControl:true
});
map.addControl(new maplibregl.NavigationControl({showCompass:true}), 'top-right');

let marker=null, popup=null;

function fc(features){ return {type:'FeatureCollection', features}; }
function ring(latlngs){ const r = latlngs.map(([la,lo])=>[lo,la]); r.push(r[0]); return r; }

map.on('load', async () => {
  const g = await (await fetch('api/geo')).json();

  // --- UK MultiPolygon (Great Britain + Northern Ireland) ---
  const ukRings = g.uk_polygons.map(p => [ring(p)]);   // [[ring],[ring]] per polygon
  map.addSource('uk', {type:'geojson', data:{type:'Feature',
    geometry:{type:'MultiPolygon', coordinates:ukRings}}});
  map.addLayer({id:'uk-fill', type:'fill', source:'uk', paint:{'fill-color':'#c0392b','fill-opacity':0.05}});
  map.addLayer({id:'uk-line', type:'line', source:'uk', paint:{'line-color':'#c0392b','line-width':2}});

  // --- London box ---
  const [a,b,c,d] = g.london_box; // latMin,latMax,lonMin,lonMax
  const ldn = [[c,a],[d,a],[d,b],[c,b],[c,a]];
  map.addSource('ldn', {type:'geojson', data:{type:'Feature', geometry:{type:'Polygon', coordinates:[ldn]}}});
  map.addLayer({id:'ldn-fill', type:'fill', source:'ldn', paint:{'fill-color':'#2668c7','fill-opacity':0.06}});
  map.addLayer({id:'ldn-line', type:'line', source:'ldn', paint:{'line-color':'#2668c7','line-width':2}});

  // --- track trail ---
  map.addSource('trail', {type:'geojson', data:fc([])});
  map.addLayer({id:'trail', type:'line', source:'trail',
    paint:{'line-color':'#e67e22','line-width':2.5,'line-opacity':0.75},
    layout:{'line-cap':'round','line-join':'round'}});

  // fit to the whole UK MultiPolygon
  const flat = ukRings.flatMap(poly => poly[0]); // all [lon,lat] vertices across both rings
  const bounds = flat.reduce((bb,ll)=>bb.extend(ll), new maplibregl.LngLatBounds(flat[0], flat[0]));
  map.fitBounds(bounds, {padding:40, duration:0});

  tick();
  setInterval(tick, 2000);
});

async function tick(){
  try{
    const s = await (await fetch('api/state',{cache:'no-store'})).json();
    const [label,color] = BADGE[s.presence]||BADGE.unknown;
    const badge = document.getElementById('badge');
    badge.textContent=label; badge.style.background=color;
    document.getElementById('summary').textContent=s.summary||'';
    const age = s.age_sec==null?'—':s.age_sec+'s ago';
    document.getElementById('meta').innerHTML =
      `feed: ${s.feed_ok?'ok':'stale'} · region: ${s.region} · updated ${age}`
      + `<br><a href="${s.map_url}" target="_blank" rel="noopener">open on adsbexchange ↗</a>`;

    const ac = s.aircraft;
    if(ac && ac.lat!=null){
      const ll=[ac.lon, ac.lat];
      if(!marker){
        const el=document.createElement('div');
        el.innerHTML=BLIMP_SVG;
        marker=new maplibregl.Marker({element:el, rotationAlignment:'map'}).setLngLat(ll).addTo(map);
        popup=new maplibregl.Popup({offset:20, closeButton:false});
        el.addEventListener('click',()=>{
          popup.setLngLat(marker.getLngLat())
            .setHTML(`<b>D-LZFN</b><br>${ac.alt_baro} ft · ${ac.gs} kt · ${ac.track}°`).addTo(map);
        });
      } else {
        marker.setLngLat(ll);
      }
      marker.setRotation(ac.track||0);
    }

    const hist = await (await fetch('api/history',{cache:'no-store'})).json();
    const pts = hist.filter(h=>h.lat!=null).map(h=>[h.lon,h.lat]);
    if(map.getSource('trail')){
      map.getSource('trail').setData(pts.length>1
        ? fc([{type:'Feature', geometry:{type:'LineString', coordinates:pts}}]) : fc([]));
    }
  }catch(e){ document.getElementById('summary').textContent='service unreachable — retrying…'; }
}
</script>
</body>
</html>
