<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>blimp-watch â€” D-LZFN live</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,sans-serif}
  #map{position:absolute;inset:0}
  #panel{position:absolute;top:10px;left:10px;z-index:2;background:rgba(255,255,255,.95);
    padding:13px 15px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.28);width:270px}
  #panel h1{margin:0;font-size:15px}
  .hdr{display:flex;justify-content:space-between;align-items:center}
  .follow{font-size:11px;opacity:.7;cursor:pointer;user-select:none}
  .follow input{vertical-align:-1px;margin-right:2px}
  #spark{display:none;margin-top:8px;overflow:visible}
  #spark .sl{fill:none;stroke:#e67e22;stroke-width:1.5}
  #spark .sd{fill:#e67e22}
  #spark text{font-size:9px;fill:currentColor;opacity:.55}
  .ident{font-size:11px;opacity:.6;margin:1px 0 8px}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
  #summary{font-size:12.5px;margin:8px 0 4px;line-height:1.35}
  .grid{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:12px;margin:9px 0 4px;
    border-top:1px solid rgba(128,128,128,.25);padding-top:9px}
  .grid .k{opacity:.6}
  .grid .v{text-align:right;font-variant-numeric:tabular-nums}
  .dim{opacity:.5}
  .meta{font-size:10.5px;opacity:.65;margin-top:9px;border-top:1px solid rgba(128,128,128,.25);padding-top:8px}
  .meta a{color:#2668c7}
  .blimp{cursor:pointer;filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.45))}
  @media (prefers-color-scheme: dark){
    #panel{background:rgba(26,28,32,.95);color:#eee}
    .meta a{color:#6fa8ff}
  }
</style>
</head>
<body>
<div id="panel">
  <div class="hdr">
    <h1>đź›©ď¸Ź blimp-watch</h1>
    <label class="follow"><input type="checkbox" id="follow"> follow</label>
  </div>
  <div class="ident" id="ident">D-LZFN Â· Zeppelin NT</div>
  <div><span id="badge" class="badge" style="background:#888">â€¦</span></div>
  <div id="summary">connectingâ€¦</div>
  <div class="grid" id="details"></div>
  <svg id="spark" width="238" height="34"></svg>
  <div class="meta" id="meta"></div>
</div>
<div id="map"></div>
<script>
const STYLE = 'https://tiles.openfreemap.org/styles/liberty';  // free vector tiles, no key
const LONDON = [51.5074, -0.1278];  // city centre, for range readout
const BADGE = {
  airborne_london:['OVER LONDON','#c0392b'], airborne_uk:['OVER THE UK','#2668c7'],
  airborne_away:['OUTSIDE UK','#8e44ad'], ground:['ON GROUND','#7f8c8d'],
  offline:['OFFLINE','#34495e'], unknown:['â€¦','#888']
};
const TITLES = {
  airborne_london:'đź›©ď¸Ź Over London', airborne_uk:'đź›©ď¸Ź Over the UK', airborne_away:'đź›©ď¸Ź Outside UK',
  ground:'âš“ On the ground', offline:'đź’¤ Offline', unknown:'â€¦'
};
const COMPASS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

// top-down airship silhouette ("sleek & long") â€” nose "up" (north) at 0Â°, rotated to track.
const BLIMP_SVG = `
<svg class="blimp" width="42" height="42" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="benv" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0" stop-color="#b06d0d"/><stop offset=".5" stop-color="#ffd587"/>
    <stop offset="1" stop-color="#b06d0d"/></linearGradient></defs>
  <g stroke="#5a3703" stroke-linejoin="round">
    <path d="M28.5 34.5 L36 40.5 L27 37.5 Z" fill="#9e620d" stroke-width=".7"/>
    <path d="M19.5 34.5 L12 40.5 L21 37.5 Z" fill="#9e620d" stroke-width=".7"/>
    <path d="M24 3.5 C29.5 4.2 31.5 12 31.5 23 C31.5 33 28 41.5 24 45
             C20 41.5 16.5 33 16.5 23 C16.5 12 18.5 4.2 24 3.5 Z"
          fill="url(#benv)" stroke-width="1.1"/>
    <line x1="24" y1="7" x2="24" y2="42.5" stroke="#5a3703" stroke-width=".6" opacity=".35"/>
    <rect x="22" y="21" width="4" height="6.5" rx="2" fill="#2b2b2b" stroke-width=".5"/>
    <circle cx="24" cy="5.5" r="1.3" fill="#2b2b2b"/>
  </g></svg>`;

function compass(t){ return COMPASS[Math.round((t%360)/22.5)%16]; }
function haversine(la1,lo1,la2,lo2){
  const R=6371, r=Math.PI/180, dLa=(la2-la1)*r, dLo=(lo2-lo1)*r;
  const a=Math.sin(dLa/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
const kv=(k,v)=>`<div class="k">${k}</div><div class="v">${v}</div>`;
function fmtDur(sec){
  sec=Math.max(0,Math.round(sec));
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  return h ? `${h}h ${m}m` : m ? `${m}m ${s}s` : `${s}s`;
}

function renderSpark(hist){
  const el=document.getElementById('spark');
  const N=hist.filter(h=>typeof h.alt==='number').slice(-60);
  if(N.length<2){ el.style.display='none'; return; }
  const W=238,H=34,L=26,pad=3;               // L = left gutter for hi/lo labels
  const alts=N.map(p=>p.alt), lo=Math.min(...alts), hi=Math.max(...alts), rng=(hi-lo)||1;
  const x=i=> L + i*(W-L-pad)/(N.length-1);
  const y=a=> pad + (H-2*pad)*(1-(a-lo)/rng);
  const d=N.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p.alt).toFixed(1)}`).join(' ');
  el.innerHTML =
    `<path class="sl" d="${d}"/>`+
    `<circle class="sd" cx="${x(N.length-1).toFixed(1)}" cy="${y(N[N.length-1].alt).toFixed(1)}" r="2"/>`+
    `<text x="0" y="8">${hi}ft</text><text x="0" y="${H-2}">${lo}ft</text>`;
  el.style.display='block';
}

function renderDetails(s){
  const el=document.getElementById('details'), ac=s.aircraft, rows=[];
  if(!ac || ac.lat==null){
    if(s.last_ac && s.last_seen_ts && s.ts){
      rows.push(kv('Status','transponder off'));
      rows.push(kv('Last seen', fmtDur(s.ts - s.last_seen_ts)+' ago'));
      rows.push(kv('Last pos', `${s.last_ac.lat.toFixed(3)}, ${s.last_ac.lon.toFixed(3)}`));
    } else { rows.push(kv('Status','â€”')); }
    el.innerHTML = rows.join(''); return;
  }
  const alt=ac.alt_baro;
  if(alt==='ground'){
    rows.push(kv('Status','moored / taxiing'));
  } else if(alt!=null){
    rows.push(kv('Altitude', `${alt} ft <span class="dim">${Math.round(alt*0.3048)} m</span>`));
    if(ac.alt_geom!=null && Math.abs(ac.alt_geom-alt)>25) rows.push(kv('Alt (GPS)', `${ac.alt_geom} ft`));
    if(ac.baro_rate!=null){
      const vr=ac.baro_rate, arr=vr>50?'â–˛':vr<-50?'â–Ľ':'level';
      rows.push(kv('Vert. rate', vr>50||vr<-50 ? `${vr>0?'+':''}${vr} ft/min ${arr}` : 'level'));
    }
  }
  if(ac.gs!=null) rows.push(kv('Ground spd', `${ac.gs} kt <span class="dim">${Math.round(ac.gs*1.852)} km/h</span>`));
  if(ac.track!=null) rows.push(kv('Heading', `${Math.round(ac.track)}Â° ${compass(ac.track)}`));
  if(s.airborne_since && s.ts) rows.push(kv('Airborne for', fmtDur(s.ts - s.airborne_since)));
  if(s.dist_km) rows.push(kv('Flight dist.', `${s.dist_km} km <span class="dim">${(s.dist_km*0.539957).toFixed(1)} nm</span>`));
  if(ac.squawk) rows.push(kv('Squawk', ac.squawk));
  const d=haversine(ac.lat,ac.lon,LONDON[0],LONDON[1]);
  rows.push(kv('From London', `${d<10?d.toFixed(1):Math.round(d)} km`));
  rows.push(kv('Position', `${ac.lat.toFixed(4)}, ${ac.lon.toFixed(4)}`));
  if(ac.rssi!=null) rows.push(kv('Signal', `${ac.rssi} dBm`));
  if(ac.seen!=null) rows.push(kv('Last msg', `${ac.seen}s ago`));
  el.innerHTML=rows.join('');
}

const map = new maplibregl.Map({
  container:'map', style:STYLE, center:[-2.5,54], zoom:5, attributionControl:true
});
map.addControl(new maplibregl.NavigationControl({showCompass:true}), 'top-right');

let marker=null, markerEl=null, popup=null, cur=null;
function fc(features){ return {type:'FeatureCollection', features}; }
function ring(latlngs){ const r = latlngs.map(([la,lo])=>[lo,la]); r.push(r[0]); return r; }

map.on('load', async () => {
  const g = await (await fetch('api/geo')).json();

  const ukRings = g.uk_polygons.map(p => [ring(p)]);
  map.addSource('uk', {type:'geojson', data:{type:'Feature', geometry:{type:'MultiPolygon', coordinates:ukRings}}});
  map.addLayer({id:'uk-fill', type:'fill', source:'uk', paint:{'fill-color':'#c0392b','fill-opacity':0.05}});
  map.addLayer({id:'uk-line', type:'line', source:'uk', paint:{'line-color':'#c0392b','line-width':2}});

  const [a,b,c,d] = g.london_box;
  const ldn = [[c,a],[d,a],[d,b],[c,b],[c,a]];
  map.addSource('ldn', {type:'geojson', data:{type:'Feature', geometry:{type:'Polygon', coordinates:[ldn]}}});
  map.addLayer({id:'ldn-fill', type:'fill', source:'ldn', paint:{'fill-color':'#2668c7','fill-opacity':0.06}});
  map.addLayer({id:'ldn-line', type:'line', source:'ldn', paint:{'line-color':'#2668c7','line-width':2}});

  map.addSource('trail', {type:'geojson', data:fc([])});
  map.addLayer({id:'trail', type:'line', source:'trail',
    paint:{'line-color':'#e67e22','line-width':2.5,'line-opacity':0.75},
    layout:{'line-cap':'round','line-join':'round'}});

  const flat = ukRings.flatMap(poly => poly[0]);
  const bounds = flat.reduce((bb,ll)=>bb.extend(ll), new maplibregl.LngLatBounds(flat[0], flat[0]));
  map.fitBounds(bounds, {padding:40, duration:0});

  tick();
  setInterval(tick, 2000);
});

async function tick(){
  try{
    const s = await (await fetch('api/state',{cache:'no-store'})).json();
    const [label,color] = BADGE[s.presence]||BADGE.unknown;
    const badge = document.getElementById('badge');
    badge.textContent=label; badge.style.background=color;
    const ac = s.aircraft;
    document.getElementById('ident').textContent =
      (ac && ac.r ? ac.r : 'D-LZFN') + ' Â· ' + (ac && ac.desc ? ac.desc : 'Zeppelin NT');
    document.getElementById('summary').textContent = s.summary||'';
    document.title = (TITLES[s.presence]||'blimp-watch') + ' Â· blimp-watch';
    renderDetails(s);
    const age = s.age_sec==null?'â€”':s.age_sec+'s ago';
    document.getElementById('meta').innerHTML =
      `feed ${s.feed_ok?'ok':'stale'} Â· region ${s.region} Â· updated ${age}`
      + ` Â· <a href="${s.map_url}" target="_blank" rel="noopener">adsbexchange â†—</a>`;

    // show the live fix, or fall back to the last-known position (faded) when offline
    const live = !!(ac && ac.lat!=null);
    const shown = live ? ac : (s.last_ac && s.last_ac.lat!=null ? s.last_ac : null);
    cur = shown;
    if(shown){
      const ll=[shown.lon, shown.lat];
      if(!marker){
        markerEl=document.createElement('div');
        markerEl.innerHTML=BLIMP_SVG;
        marker=new maplibregl.Marker({element:markerEl, rotationAlignment:'map'}).setLngLat(ll).addTo(map);
        popup=new maplibregl.Popup({offset:22, closeButton:false});
        markerEl.addEventListener('click',()=>{
          if(!cur) return;
          popup.setLngLat(marker.getLngLat())
            .setHTML(`<b>D-LZFN</b> â€” Goodyear Blimp<br>${cur.alt_baro} ft Â· ${cur.gs} kt Â· ${Math.round(cur.track)}Â°`)
            .addTo(map);
        });
      } else { marker.setLngLat(ll); }
      marker.setRotation(shown.track||0);
      markerEl.style.opacity = live ? '1' : '0.4';
      markerEl.title = live ? '' : 'last known position';
      if(document.getElementById('follow').checked) map.easeTo({center:ll, duration:700});
    }

    const hist = await (await fetch('api/history',{cache:'no-store'})).json();
    const pts = hist.filter(h=>h.lat!=null).map(h=>[h.lon,h.lat]);
    if(map.getSource('trail')){
      map.getSource('trail').setData(pts.length>1
        ? fc([{type:'Feature', geometry:{type:'LineString', coordinates:pts}}]) : fc([]));
    }
    renderSpark(hist);
  }catch(e){ document.getElementById('summary').textContent='service unreachable â€” retryingâ€¦'; }
}
</script>
</body>
</html>
