services:
  blimp-watch:
    build: .
    image: blimp-watch:latest
    container_name: blimp-watch
    restart: unless-stopped
    ports:
      - "8080:8080"          # map at http://<server>:8080/, API under /api/
    env_file:
      - .env                 # copy .env.example -> .env and fill in your notifier
    volumes:
      - ./data:/data         # persists sticky region/presence across restarts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
